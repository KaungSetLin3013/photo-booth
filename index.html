<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>FOTO BOOTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --cream:#F2E8D5;
  --sepia:#2C1A0E;
  --orange:#D4612A;
  --red:#A0291A;
  --olive:#8B7355;
  --film:#1A1208;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--film)}
body{font-family:'Special Elite',serif;color:var(--cream);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");opacity:0.5;pointer-events:none;z-index:999}

/* ── Film strip header ── */
.filmstrip{background:var(--film);border-bottom:3px solid #111;display:flex;align-items:center;flex-shrink:0;position:relative;overflow:hidden;height:56px}
.sprockets{display:flex;flex-direction:column;justify-content:space-around;padding:6px 4px;gap:4px;height:100%;flex-shrink:0}
.sprocket{width:10px;height:8px;background:var(--film);border:2px solid var(--olive);border-radius:2px}
.film-title-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.film-brand{font-family:'VT323',monospace;font-size:22px;color:var(--orange);letter-spacing:4px;line-height:1}
.film-sub{font-family:'VT323',monospace;font-size:11px;color:var(--olive);letter-spacing:3px}
.frame-counter{font-family:'VT323',monospace;font-size:28px;color:var(--orange);background:#0A0600;border:2px solid var(--olive);padding:2px 8px;margin-right:4px;min-width:52px;text-align:center;flex-shrink:0;text-shadow:0 0 8px var(--orange)}
.admin-trigger{position:absolute;top:0;right:28px;width:50px;height:100%;cursor:default;z-index:10}

/* ── Nav ── */
.nav{display:flex;background:#120D06;border-bottom:2px solid #3A2510;flex-shrink:0}
.nav-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--olive);font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
.nav-btn.active{color:var(--orange);border-bottom-color:var(--orange);background:rgba(212,97,42,0.08)}

/* ── Scroll area ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-pane{display:none;min-height:100%}
.tab-pane.active{display:block}

/* ── Viewfinder ── */
.viewfinder{position:relative;width:100%;aspect-ratio:3/4;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:none;filter:sepia(0.3) contrast(1.1)}
.vf-overlay{position:absolute;inset:0;pointer-events:none;z-index:2}
.vf-overlay::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)}
.vf-overlay::after{content:'';position:absolute;inset:12px;box-shadow:inset 12px 12px 0 0 var(--orange),inset -12px -12px 0 0 var(--orange);opacity:0.7}
.vf-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--olive);font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;text-align:center;gap:8px}
.vf-placeholder .cam-icon{font-size:56px;opacity:0.4}
#captured-img{width:100%;height:100%;object-fit:cover;display:none;filter:sepia(0.25) contrast(1.05)}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10;transition:opacity 0.05s}

/* ── Film data strip ── */
.film-data{background:#0A0600;border-top:2px solid #2A1A08;border-bottom:2px solid #2A1A08;padding:4px 12px;display:flex;justify-content:space-between;align-items:center}
.film-data span{font-family:'VT323',monospace;font-size:13px;color:var(--olive);letter-spacing:1px}
.film-data .exp{color:var(--orange)}

/* ── Name input ── */
.name-wrap{padding:10px 14px;background:#120D06}
.input-label{font-family:'VT323',monospace;font-size:13px;color:var(--olive);letter-spacing:2px;margin-bottom:4px}
.retro-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--olive);color:var(--cream);font-family:'Special Elite',serif;font-size:16px;padding:6px 2px;outline:none;letter-spacing:1px;transition:border-color 0.2s}
.retro-input:focus{border-bottom-color:var(--orange)}
.retro-input::placeholder{color:var(--olive);opacity:0.6}

/* ── Controls ── */
.controls{padding:14px;background:#0A0600;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctrl-btn{background:#1E1208;border:2px solid var(--olive);color:var(--cream);font-family:'VT323',monospace;font-size:16px;letter-spacing:1px;padding:10px 16px;border-radius:4px;cursor:pointer;transition:all 0.15s;flex:1}
.ctrl-btn:active{background:var(--olive);color:var(--film)}
.shutter{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#E8E0D0,#A09080);border:4px solid var(--olive);box-shadow:0 0 0 3px #2A1A08,0 0 0 5px var(--olive);cursor:pointer;flex-shrink:0;transition:transform 0.08s;display:flex;align-items:center;justify-content:center;font-size:22px}
.shutter:active{transform:scale(0.92)}
.shutter.hidden{display:none}

/* ── Upload button ── */
.upload-row{padding:10px 14px;background:#0A0600}
.upload-big-btn{width:100%;background:var(--orange);color:var(--film);border:none;font-family:'VT323',monospace;font-size:22px;letter-spacing:3px;padding:14px;cursor:pointer;border-radius:4px;transition:all 0.15s;display:none}
.upload-big-btn:active{background:#B8511F;transform:scale(0.98)}
.upload-big-btn:disabled{opacity:0.5;cursor:not-allowed}
.file-upload-alt{text-align:center;padding:6px 0 4px;font-family:'VT323',monospace;font-size:14px;color:var(--olive);letter-spacing:1px}
.file-upload-alt label{color:var(--orange);cursor:pointer;border-bottom:1px solid var(--orange)}

/* ── Status ── */
.status-tape{margin:10px 14px;padding:8px 12px;font-family:'VT323',monospace;font-size:16px;letter-spacing:1px;border-radius:2px;display:none;text-align:center}
.status-tape.ok{background:#1A2E1A;color:#8BC98B;border:1px solid #2E5A2E;display:block}
.status-tape.err{background:#2E1A1A;color:#C98B8B;border:1px solid #5A2E2E;display:block}

/* ── Gallery ── */
.gallery-pane{background:var(--film);min-height:100%}
.gallery-toolbar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #2A1A08}
.gallery-toolbar span{font-family:'VT323',monospace;font-size:16px;color:var(--olive);letter-spacing:2px}
.toolbar-count{color:var(--orange) !important}
.refresh-btn{background:transparent;border:1px solid var(--olive);color:var(--olive);font-family:'VT323',monospace;font-size:14px;letter-spacing:1px;padding:5px 10px;cursor:pointer;border-radius:2px}
.refresh-btn:active{background:var(--olive);color:var(--film)}

/* ── Contact sheet ── */
.contact-sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;background:#0A0600}
.film-frame{position:relative;aspect-ratio:1;background:#111;overflow:hidden;cursor:pointer}
.film-frame img{width:100%;height:100%;object-fit:cover;filter:sepia(0.2) contrast(1.05);transition:filter 0.2s}
.film-frame:active img{filter:sepia(0) contrast(1.1)}
.frame-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:4px 5px 3px}
.frame-info .fn{font-family:'VT323',monospace;font-size:12px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frame-info .ft{font-family:'VT323',monospace;font-size:10px;color:var(--olive)}
.frame-num{position:absolute;top:3px;left:3px;font-family:'VT323',monospace;font-size:11px;color:var(--orange);background:rgba(0,0,0,0.6);padding:1px 4px}
.del-x{position:absolute;top:3px;right:3px;background:#A0291A;color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;font-family:'VT323',monospace}
.admin-mode .del-x{display:flex}
.gallery-empty{text-align:center;padding:60px 20px;font-family:'VT323',monospace;font-size:18px;color:var(--olive);letter-spacing:2px;grid-column:1/-1}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:70vh;object-fit:contain;border:3px solid var(--olive);filter:sepia(0.2)}
.lightbox-meta{margin-top:12px;text-align:center}
.lname{font-family:'VT323',monospace;font-size:24px;color:var(--cream);letter-spacing:2px}
.ltime{font-family:'VT323',monospace;font-size:14px;color:var(--olive);margin-top:2px}
.lightbox-close{position:absolute;top:16px;right:16px;background:transparent;border:2px solid var(--olive);color:var(--olive);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;font-family:'VT323',monospace;display:flex;align-items:center;justify-content:center}

/* ── QR ── */
.qr-pane{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:30px 20px;gap:20px;text-align:center}
.qr-title{font-family:'VT323',monospace;font-size:32px;color:var(--orange);letter-spacing:4px}
.qr-sub{font-family:'VT323',monospace;font-size:14px;color:var(--olive);letter-spacing:2px;line-height:1.8}
#qr-box{background:var(--cream);padding:14px;border-radius:4px;border:4px solid var(--olive)}
#qr-box canvas,#qr-box img{display:block}
.qr-url-txt{font-family:'VT323',monospace;font-size:13px;color:var(--olive);word-break:break-all;max-width:300px;line-height:1.6;margin-top:4px}

/* ── Admin bar ── */
.admin-bar{display:none;background:#1A0808;border-bottom:2px solid var(--red);padding:10px 14px;align-items:center;justify-content:space-between;gap:8px}
.admin-bar.on{display:flex}
.admin-bar span{font-family:'VT323',monospace;font-size:15px;color:#C98B8B;letter-spacing:1px}
.admin-btns{display:flex;gap:6px}
.adm-btn{background:transparent;border:1px solid var(--red);color:#C98B8B;font-family:'VT323',monospace;font-size:14px;letter-spacing:1px;padding:5px 10px;cursor:pointer;border-radius:2px}
.adm-btn:active{background:var(--red);color:#fff}

/* ── Admin modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:#1E1208;border:2px solid var(--olive);border-radius:4px;padding:28px 22px;width:88%;max-width:340px}
.modal-box h2{font-family:'VT323',monospace;font-size:24px;color:var(--orange);letter-spacing:3px;margin-bottom:16px}
.modal-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--olive);color:var(--cream);font-family:'Special Elite',serif;font-size:16px;padding:8px 2px;outline:none;margin-bottom:16px;letter-spacing:1px}
.modal-input:focus{border-bottom-color:var(--orange)}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:11px;border:none;font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;cursor:pointer;border-radius:3px}
.modal-btn-ok{background:var(--orange);color:var(--film)}
.modal-btn-cancel{background:transparent;border:2px solid var(--olive);color:var(--olive)}
.modal-err{font-family:'VT323',monospace;font-size:14px;color:#C98B8B;margin-top:10px;text-align:center;letter-spacing:1px;min-height:18px}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(44,26,14,0.3);border-top-color:var(--film);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@supports(padding-bottom:env(safe-area-inset-bottom)){.nav{padding-bottom:env(safe-area-inset-bottom)}}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-track{background:var(--film)}
.main::-webkit-scrollbar-thumb{background:var(--olive);border-radius:2px}
</style>
</head>
<body>

<!-- Film strip header -->
<div class="filmstrip">
  <div class="sprockets"><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div></div>
  <div class="film-title-area">
    <div class="film-brand">FOTO BOOTH</div>
    <div class="film-sub">ISO 400 ◆ 35mm</div>
  </div>
  <div class="frame-counter" id="frame-counter">00</div>
  <div class="sprockets"><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div></div>
  <div class="admin-trigger" id="admin-trigger"></div>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('camera')" id="nav-camera">[ SHOOT ]</button>
  <button class="nav-btn" onclick="switchTab('gallery')" id="nav-gallery">[ ROLL ]</button>
  <button class="nav-btn" onclick="switchTab('qr')" id="nav-qr">[ SHARE ]</button>
</div>

<!-- Admin bar -->
<div class="admin-bar" id="admin-bar">
  <span>🔴 ADMIN MODE</span>
  <div class="admin-btns">
    <button class="adm-btn" onclick="deleteAll()">PURGE ALL</button>
    <button class="adm-btn" onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<!-- Main -->
<div class="main" id="main">

  <!-- Camera tab -->
  <div class="tab-pane active" id="tab-camera">
    <div class="viewfinder">
      <video id="video" autoplay playsinline muted></video>
      <img id="captured-img" alt="captured">
      <div class="vf-overlay"></div>
      <div class="flash" id="flash"></div>
      <div class="vf-placeholder" id="vf-placeholder">
        <div class="cam-icon">📷</div>
        <div>TAP TO START</div>
        <div style="font-size:13px;margin-top:4px;color:var(--olive)">OR UPLOAD BELOW</div>
      </div>
    </div>
    <div class="film-data">
      <span id="cam-mode">STANDBY</span>
      <span class="exp" id="datestamp">--/--/----</span>
      <span id="cam-res">——</span>
    </div>
    <div class="name-wrap">
      <div class="input-label">PHOTOGRAPHER</div>
      <input class="retro-input" type="text" id="name-input" placeholder="your name here..." maxlength="40">
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="start-btn" onclick="startCamera()">▶ START</button>
      <div class="shutter hidden" id="shutter-btn" onclick="snap()">📸</div>
      <button class="ctrl-btn" id="retake-btn" onclick="retake()" style="display:none">↩ RETAKE</button>
      <button class="ctrl-btn" id="file-btn" style="font-size:13px" onclick="document.getElementById('file-input').click()">⬆ UPLOAD</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
    </div>
    <div class="upload-row">
      <button class="upload-big-btn" id="upload-btn" onclick="uploadPhoto()">DEVELOP →</button>
    </div>
    <div class="file-upload-alt">or <label for="file-input">choose from device</label></div>
    <div id="status-area"></div>
  </div>

  <!-- Gallery tab -->
  <div class="tab-pane" id="tab-gallery">
    <div class="gallery-pane">
      <div class="gallery-toolbar">
        <span class="toolbar-count" id="count-badge">-- FRAMES</span>
        <button class="refresh-btn" onclick="loadGallery()">↻ REWIND</button>
      </div>
      <div class="contact-sheet" id="contact-sheet">
        <div class="gallery-empty">NO FRAMES YET<br><span style="font-size:13px">BE THE FIRST TO SHOOT</span></div>
      </div>
    </div>
  </div>

  <!-- QR tab -->
  <div class="tab-pane" id="tab-qr">
    <div class="qr-pane">
      <div class="qr-title">SCAN ME</div>
      <div class="qr-sub">POINT YOUR CAMERA<br>AT THIS CODE TO<br>JOIN THE SHOOT</div>
      <div id="qr-box"></div>
      <div class="qr-url-txt" id="qr-url-txt"></div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-meta">
    <div class="lname" id="lightbox-name"></div>
    <div class="ltime" id="lightbox-time"></div>
  </div>
</div>

<!-- Admin modal -->
<div class="modal-bg" id="admin-modal">
  <div class="modal-box">
    <h2>// ADMIN //</h2>
    <input class="modal-input" type="password" id="admin-pass" placeholder="enter password" onkeydown="if(event.key==='Enter')checkPass()">
    <div class="modal-btns">
      <button class="modal-btn modal-btn-ok" onclick="checkPass()">ENTER</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">BACK</button>
    </div>
    <div class="modal-err" id="pass-err"></div>
  </div>
</div>

<script>
// ── Cloudinary config (safe to be public — unsigned upload preset) ──
const CL_CLOUD  = 'dk5y4iq6b';
const CL_PRESET = 'photo-booth';
const CL_FOLDER = 'photo-booth';
const CL_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`;
const CL_LIST_URL   = `https://res.cloudinary.com/${CL_CLOUD}/image/list/${CL_FOLDER}.json`;

const ADMIN_PW = 'kaungadmin2024';

let stream = null, capturedDataUrl = null, adminMode = false;
let tapCount = 0, tapTimer = null, photoCount = 0;
let galleryPhotos = [];

// datestamp
const now = new Date();
document.getElementById('datestamp').textContent =
  String(now.getDate()).padStart(2,'0') + '/' +
  String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear();

// ── Admin trigger (triple-tap hidden zone) ───────────────
document.getElementById('admin-trigger').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 800);
  if (tapCount >= 3) { tapCount = 0; openAdminModal(); }
});

function openAdminModal() {
  document.getElementById('admin-modal').classList.add('open');
  document.getElementById('admin-pass').value = '';
  document.getElementById('pass-err').textContent = '';
  setTimeout(() => document.getElementById('admin-pass').focus(), 100);
}
function closeAdminModal() { document.getElementById('admin-modal').classList.remove('open'); }
function checkPass() {
  if (document.getElementById('admin-pass').value === ADMIN_PW) {
    closeAdminModal(); enterAdmin();
  } else {
    document.getElementById('pass-err').textContent = '[ WRONG PASSWORD ]';
  }
}
function enterAdmin() {
  adminMode = true;
  document.getElementById('admin-bar').classList.add('on');
  document.getElementById('contact-sheet').classList.add('admin-mode');
  switchTab('gallery');
}
function exitAdmin() {
  adminMode = false;
  document.getElementById('admin-bar').classList.remove('on');
  document.getElementById('contact-sheet').classList.remove('admin-mode');
}

// ── Cloudinary upload ─────────────────────────────────────
function resizeImage(dataUrl, max) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else       { w = Math.round(w * max / h); h = max; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

async function uploadToCloudinary(dataUrl, name) {
  const resized = await resizeImage(dataUrl, 1200);
  const fd = new FormData();
  fd.append('file', resized);
  fd.append('upload_preset', CL_PRESET);
  fd.append('folder', CL_FOLDER);
  // store name + time as context metadata
  const timeStr = now.toLocaleString('en-GB', {
    day:'numeric', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
  fd.append('context', `photographer=${name}|shot_time=${timeStr}`);

  const res = await fetch(CL_UPLOAD_URL, { method: 'POST', body: fd });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'Upload failed');
  }
  return res.json();
}

// ── Fetch gallery from Cloudinary ────────────────────────
async function fetchPhotos() {
  // Cloudinary resource list via signed URL is backend-only,
  // so we use the public "list" tag URL (requires "list" tag on upload)
  // Instead we use the Search API with unsigned preset — use tag approach
  const res = await fetch(CL_LIST_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('Could not load gallery');
  const data = await res.json();
  return (data.resources || []).map(r => ({
    url: r.secure_url,
    publicId: r.public_id,
    name: r.context?.custom?.photographer || 'Anonymous',
    time: r.context?.custom?.shot_time    || '',
    created: r.created_at
  })).sort((a, b) => new Date(b.created) - new Date(a.created));
}

// ── Admin delete (needs signed API — show instruction) ────
async function deleteAll() {

// ── Camera ───────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:960} }, audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = stream; v.style.display = 'block';
    document.getElementById('vf-placeholder').style.display = 'none';
    document.getElementById('captured-img').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('shutter-btn').classList.remove('hidden');
    document.getElementById('retake-btn').style.display = 'none';
    document.getElementById('upload-btn').style.display = 'none';
    document.getElementById('cam-mode').textContent = 'LIVE';
    document.getElementById('cam-res').textContent = '1280×960';
    capturedDataUrl = null;
  } catch { showStatus('CAMERA UNAVAILABLE — USE UPLOAD', 'err'); }
}

function snap() {
  const v = document.getElementById('video');
  const c = document.createElement('canvas');
  c.width = v.videoWidth || 640; c.height = v.videoHeight || 480;
  c.getContext('2d').drawImage(v, 0, 0);
  capturedDataUrl = c.toDataURL('image/jpeg', 0.92);
  const fl = document.getElementById('flash');
  fl.style.opacity = '1'; setTimeout(() => fl.style.opacity = '0', 120);
  const img = document.getElementById('captured-img');
  img.src = capturedDataUrl; img.style.display = 'block';
  v.style.display = 'none';
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('shutter-btn').classList.add('hidden');
  document.getElementById('retake-btn').style.display = 'block';
  document.getElementById('upload-btn').style.display = 'block';
  document.getElementById('cam-mode').textContent = 'FRAME READY';
}

function retake() {
  capturedDataUrl = null;
  document.getElementById('captured-img').style.display = 'none';
  document.getElementById('captured-img').src = '';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('shutter-btn').classList.add('hidden');
  document.getElementById('retake-btn').style.display = 'none';
  document.getElementById('upload-btn').style.display = 'none';
  document.getElementById('vf-placeholder').style.display = 'flex';
  document.getElementById('cam-mode').textContent = 'STANDBY';
}

function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    capturedDataUrl = ev.target.result;
    const img = document.getElementById('captured-img');
    img.src = capturedDataUrl; img.style.display = 'block';
    document.getElementById('vf-placeholder').style.display = 'none';
    document.getElementById('video').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('shutter-btn').classList.add('hidden');
    document.getElementById('retake-btn').style.display = 'block';
    document.getElementById('upload-btn').style.display = 'block';
    document.getElementById('cam-mode').textContent = 'FRAME LOADED';
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto() {
  if (!capturedDataUrl) { showStatus('NO FRAME TO DEVELOP', 'err'); return; }
  const name = document.getElementById('name-input').value.trim() || 'Anonymous';
  const btn  = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>DEVELOPING...';
  document.getElementById('cam-mode').textContent = 'UPLOADING...';
  try {
    await uploadToCloudinary(capturedDataUrl, name);
    btn.disabled = false; btn.textContent = 'DEVELOP →';
    showStatus('✓ FRAME DEVELOPED! CHECK THE ROLL.', 'ok');
    photoCount++; updateCounter(photoCount);
    capturedDataUrl = null; retake();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'DEVELOP →';
    showStatus('ERROR: ' + e.message, 'err');
    document.getElementById('cam-mode').textContent = 'FAILED';
  }
}

function showStatus(msg, type) {
  const a = document.getElementById('status-area');
  a.innerHTML = '<div class="status-tape ' + type + '">' + msg + '</div>';
  setTimeout(() => { a.innerHTML = ''; }, 5000);
}
function updateCounter(n) {
  document.getElementById('frame-counter').textContent = String(n).padStart(2, '0');
}

// ── Gallery ──────────────────────────────────────────────
async function loadGallery() {
  const sheet = document.getElementById('contact-sheet');
  const badge = document.getElementById('count-badge');
  const isAdmin = adminMode;
  sheet.innerHTML = '<div class="gallery-empty">LOADING ROLL...<br><span style="font-size:13px">REWINDING FILM</span></div>';
  try {
    const photos = await fetchPhotos();
    galleryPhotos = photos;
    badge.textContent = photos.length + ' FRAMES';
    updateCounter(photos.length); photoCount = photos.length;
    if (!photos.length) {
      sheet.innerHTML = '<div class="gallery-empty">NO FRAMES YET<br><span style="font-size:13px">BE THE FIRST TO SHOOT</span></div>';
      return;
    }
    sheet.innerHTML = photos.map((p, i) => `
      <div class="film-frame" onclick="openLightbox(${i})">
        <img src="${escAttr(p.url)}" alt="${escAttr(p.name)}" loading="lazy">
        <div class="frame-num">${String(i+1).padStart(2,'0')}</div>
        <div class="frame-info">
          <div class="fn">${escHtml(p.name)}</div>
          <div class="ft">${escHtml(p.time)}</div>
        </div>
        <button class="del-x" onclick="event.stopPropagation();deletePhoto('${escAttr(p.publicId)}')">✕</button>
      </div>
    `).join('');
    if (isAdmin) sheet.classList.add('admin-mode');
  } catch(e) {
    sheet.innerHTML = '<div class="gallery-empty">LOAD ERROR<br><span style="font-size:12px">' + escHtml(e.message) + '</span></div>';
  }
}

// ── Lightbox ─────────────────────────────────────────────
function openLightbox(idx) {
  const p = galleryPhotos[idx];
  if (!p) return;
  document.getElementById('lightbox-img').src = p.url;
  document.getElementById('lightbox-name').textContent = p.name;
  document.getElementById('lightbox-time').textContent = p.time;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── QR ───────────────────────────────────────────────────
function setupQR() {
  const box = document.getElementById('qr-box');
  const url = window.location.href.split('?')[0];
  document.getElementById('qr-url-txt').textContent = url;
  if (box.children.length) return;
  try {
    new QRCode(box, { text: url, width: 200, height: 200, colorDark:'#2C1A0E', colorLight:'#F2E8D5', correctLevel: QRCode.CorrectLevel.M });
  } catch { box.innerHTML = '<p style="color:var(--olive);padding:10px;font-family:VT323,monospace;font-size:13px">SHARE URL ABOVE</p>'; }
}

// ── Tabs ─────────────────────────────────────────────────
function switchTab(name) {
  ['camera','gallery','qr'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('nav-' + t).classList.toggle('active', t === name);
  });
  if (name === 'gallery') loadGallery();
  if (name === 'qr')      setupQR();
  document.getElementById('main').scrollTop = 0;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }
</script>
