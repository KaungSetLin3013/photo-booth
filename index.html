<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memories</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --text-muted: #888;
    --accent: #c8f057;
    --accent-dark: #9bbb2e;
    --danger: #ff4f4f;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  /* HEADER */
  .header {
    padding: 52px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header .accent { color: var(--accent); }
  .header-btn {
    width: 38px; height: 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 0 calc(12px + var(--safe-bottom));
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer; border: none; background: none;
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    padding: 4px 0; transition: color 0.15s;
  }
  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.capture-btn {
    flex: 0 0 72px;
  }
  .capture-ring {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .capture-inner {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* GALLERY SCREEN */
  #screen-gallery { overflow: hidden; }
  .pull-hint {
    text-align: center; font-size: 11px; color: var(--text-muted);
    padding: 6px 0 2px; flex-shrink: 0;
  }
  .pull-hint span { display: inline-block; }
  .gallery-scroll {
    flex: 1; overflow-y: auto; padding: 4px 4px 0;
    overscroll-behavior: contain;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }
  .gallery-item {
    aspect-ratio: 1;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--text-muted);
  }
  .gallery-empty .big-icon { font-size: 48px; opacity: 0.3; }

  /* CAMERA SCREEN */
  #screen-camera {
    background: #000;
    position: relative;
    overflow: hidden;
  }
  #camera-video {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; inset: 0;
  }
  .camera-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding-bottom: calc(24px + var(--safe-bottom));
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.7) 100%);
  }
  .camera-controls {
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 32px;
  }
  .cam-btn {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.18);
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .shutter-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .shutter-inner {
    width: 56px; height: 56px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.1s;
  }
  .shutter-btn:active .shutter-inner { transform: scale(0.88); }
  .flash {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
    z-index: 10;
  }
  .flash.go { opacity: 1; }
  .camera-caption-area {
    padding: 12px 20px 0;
    display: flex; gap: 8px;
  }
  .caption-input {
    flex: 1; background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 22px;
    padding: 8px 16px;
    color: #fff; font-size: 14px;
    outline: none; backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .caption-input::placeholder { color: rgba(255,255,255,0.5); }

  /* UPLOADER NAME MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 340px;
  }
  .modal-card h2 { font-size: 18px; margin-bottom: 6px; }
  .modal-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
  .modal-input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    color: var(--text); font-size: 16px; outline: none;
    margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; background: var(--accent);
    color: #1a1a1a; font-weight: 700; font-size: 15px;
    border: none; border-radius: 12px;
    padding: 13px; cursor: pointer;
  }
  .btn-secondary {
    width: 100%; background: transparent;
    color: var(--text-muted); font-size: 14px;
    border: 1px solid var(--border); border-radius: 12px;
    padding: 11px; cursor: pointer; margin-top: 8px;
  }

  /* ADMIN PANEL */
  #screen-admin {
    overflow: hidden;
  }
  .admin-scroll { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
  .admin-photo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .admin-photo-img {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover; display: block;
  }
  .admin-photo-body { padding: 12px; }
  .admin-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .admin-caption-input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; color: var(--text); font-size: 14px;
    outline: none; margin-bottom: 10px;
  }
  .admin-caption-input:focus { border-color: var(--accent); }
  .admin-actions { display: flex; gap: 8px; }
  .btn-save {
    flex: 1; background: var(--accent);
    color: #1a1a1a; font-weight: 600; font-size: 13px;
    border: none; border-radius: 8px; padding: 9px; cursor: pointer;
  }
  .btn-delete {
    background: transparent; color: var(--danger);
    border: 1px solid var(--danger); border-radius: 8px;
    padding: 9px 14px; font-size: 13px; cursor: pointer;
  }
  .admin-section-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin: 20px 0 12px;
  }
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .settings-card label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .settings-row { display: flex; gap: 8px; }
  .settings-row .modal-input { margin-bottom: 0; flex: 1; font-size: 14px; }

  /* LIGHTBOX */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.95);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 100%; max-height: 80dvh; object-fit: contain; }
  #lightbox-caption { color: var(--text-muted); font-size: 13px; margin-top: 12px; }
  #lightbox-close {
    position: absolute; top: 52px; right: 20px;
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.12);
    border: none; border-radius: 50%;
    color: #fff; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: calc(90px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: all 0.2s;
    white-space: nowrap; z-index: 300;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* PROGRESS */
  .upload-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: transparent; z-index: 400;
  }
  .upload-progress-bar {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.3s;
  }

  /* PULL INDICATOR */
  .pull-indicator {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; background: var(--surface2);
    transform: translateY(-100%);
    transition: transform 0.2s;
    z-index: 10;
    font-size: 13px; color: var(--text-muted); gap: 8px;
  }

  /* SPINNER */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(200,240,87,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block; flex-shrink: 0;
  }

  .text-danger { color: var(--danger); }
  .zoom-pill {
    background: transparent; border: none;
    color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 100px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .zoom-pill.active {
    background: rgba(255,255,255,0.22); color: #fff;
  }
  .filter-pill {
    background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 100px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .filter-pill.active {
    background: var(--accent); color: #1a1a1a; border-color: var(--accent);
  }
</style>
</head>

      <label>Photo Limit Per Device (0 = unlimited)</label>
      <div class="settings-row">
        <input class="modal-input" id="limit-input" type="number" min="0" placeholder="e.g. 10">
        <button class="btn-save" style="flex:0 0 auto;padding:9px 14px" onclick="savePhotoLimit()">Save</button>
      </div>
    </div>
    <div class="admin-section-title">Devices</div>
    <div id="devices-list"></div>
    <div class="admin-section-title">All Photos</div>
    <div id="admin-grid"></div>
  </div>
</div>

<script>
/* ============================================================
   SUPABASE HELPERS
   ============================================================ */
function getConfig() {
  return {
    url: localStorage.getItem('sb_url') || SUPABASE_URL,
    key: localStorage.getItem('sb_key') || SUPABASE_ANON_KEY
  };
}
function isConfigured() {
  const c = getConfig();
  return c.url && c.url !== PLACEHOLDER_URL && c.url.includes('supabase.co') &&
         c.key && c.key !== PLACEHOLDER_KEY && c.key.length > 10;
}
async function sbFetch(path, options = {}) {
  const { url, key } = getConfig();
  return fetch(url + path, {
    ...options,
    headers: {
      'apikey': key,
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
}
async function loadPhotos() {
  if (!isConfigured()) return [];
  const r = await sbFetch(`/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc`);
  if (!r.ok) return [];
  return r.json();
}
async function loadAdminPassword() {
  if (!isConfigured()) return 'admin123';
  try {
    const r = await sbFetch(`/rest/v1/settings?key=eq.admin_password&select=value`);
    if (!r.ok) return 'admin123';
    const rows = await r.json();
    return rows[0]?.value || 'admin123';
  } catch { return 'admin123'; }
}
async function saveAdminPasswordToDB(newPw) {
  const r = await sbFetch(`/rest/v1/settings?key=eq.admin_password`, {
    method: 'PATCH',
    body: JSON.stringify({ value: newPw })
  });
  return r.ok;
}
async function loadPhotoLimit() {
  if (!isConfigured()) return 0;
  try {
    const r = await sbFetch(`/rest/v1/settings?key=eq.photo_limit&select=value`);
    if (!r.ok) return 0;
    const rows = await r.json();
    return parseInt(rows[0]?.value || '0');
  } catch { return 0; }
}
async function savePhotoLimitToDB(limit) {
  const r = await sbFetch(`/rest/v1/settings?key=eq.photo_limit`, {
    method: 'PATCH',
    body: JSON.stringify({ value: String(limit) })
  });
  return r.ok;
}
async function registerOrUpdateDevice() {
  if (!isConfigured()) return;
  // Check if device exists
  const r = await sbFetch(`/rest/v1/devices?device_id=eq.${DEVICE_ID}&select=*`);
  if (!r.ok) return;
  const rows = await r.json();
  if (rows.length === 0) {
    // New device — insert
    await sbFetch(`/rest/v1/devices`, {
      method: 'POST',
      body: JSON.stringify({ device_id: DEVICE_ID, name: uploaderName || 'Unknown', photo_count: 0 })
    });
    devicePhotoCount = 0;
  } else {
    devicePhotoCount = rows[0].photo_count || 0;
    // Update name + last_seen if name changed
    await sbFetch(`/rest/v1/devices?device_id=eq.${DEVICE_ID}`, {
      method: 'PATCH',
      body: JSON.stringify({ name: uploaderName || rows[0].name, last_seen: new Date().toISOString() })
    });
  }
}
async function incrementDeviceCount() {
  devicePhotoCount++;
  await sbFetch(`/rest/v1/devices?device_id=eq.${DEVICE_ID}`, {
    method: 'PATCH',
    body: JSON.stringify({ photo_count: devicePhotoCount, last_seen: new Date().toISOString() })
  });
}
async function loadDevices() {
  if (!isConfigured()) return [];
  const r = await sbFetch(`/rest/v1/devices?select=*&order=last_seen.desc`);
  if (!r.ok) return [];
  return r.json();
}
async function uploadPhoto(blob, filename, caption) {
  const { url, key } = getConfig();
  const path = `${Date.now()}_${filename}`;
  const uploadRes = await fetch(`${url}/storage/v1/object/${BUCKET_NAME}/${path}`, {
    method: 'POST',
    headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': blob.type },
    body: blob
  });
  if (!uploadRes.ok) {
    const err = await uploadRes.text();
    console.error('Storage error:', uploadRes.status, err);
    throw new Error('Upload failed: ' + err);
  }
  const publicUrl = `${url}/storage/v1/object/public/${BUCKET_NAME}/${path}`;
  const metaRes = await sbFetch(`/rest/v1/${TABLE_NAME}`, {
    method: 'POST',
    body: JSON.stringify({ url: publicUrl, uploader: uploaderName || 'Anonymous', caption: caption || '', device_id: DEVICE_ID })
  });
  if (!metaRes.ok) throw new Error('DB insert failed');
  return metaRes.json();
}
async function deletePhoto(id, storageUrl) {
  const { url, key } = getConfig();
  const path = storageUrl.split(`/object/public/${BUCKET_NAME}/`)[1];
  if (path) {
    await fetch(`${url}/storage/v1/object/${BUCKET_NAME}/${path}`, {
      method: 'DELETE',
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
    });
  }
  await sbFetch(`/rest/v1/${TABLE_NAME}?id=eq.${id}`, { method: 'DELETE' });
}
async function updateCaption(id, caption) {
  const r = await sbFetch(`/rest/v1/${TABLE_NAME}?id=eq.${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ caption })
  });
  return r.ok;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
let currentScreen = 'camera';
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  // update nav active states
  ['nav-gallery','nav-gallery2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', name === 'gallery');
  });
  ['nav-camera','nav-camera2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', name === 'camera');
  });
  if (name === 'gallery') { loadGallery(); }
  if (name === 'camera') { startCamera(); }
  if (name === 'admin') { loadAdminGrid(); }
}

/* ============================================================
   GALLERY
   ============================================================ */
let photos = [];
async function loadGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  if (!isConfigured()) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  grid.innerHTML = '<div style="grid-column:1/-1;padding:20px;text-align:center"><div class="spinner"></div></div>';
  empty.style.display = 'none';
  photos = await loadPhotos();
  grid.innerHTML = '';
  if (photos.length === 0) { empty.style.display = 'flex'; return; }
  photos.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'gallery-item';
    el.onclick = () => openLightbox(i);
    const img = document.createElement('img');
    img.src = p.url;
    img.loading = 'lazy';
    img.alt = p.caption || 'Photo';
    el.appendChild(img);
    grid.appendChild(el);
  });
}

/* ============================================================
   LIGHTBOX
   ============================================================ */
function openLightbox(i) {
  const p = photos[i];
  document.getElementById('lightbox-img').src = p.url;
  document.getElementById('lightbox-caption').textContent =
    (p.caption ? p.caption + ' · ' : '') + (p.uploader || '') + ' · ' + new Date(p.created_at).toLocaleDateString();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

/* ============================================================
   PULL TO OPEN ADMIN
   ============================================================ */
let pullStart = 0, pullActive = false, pullTimer = null, pullProgress = 0;
const galleryScroll = document.getElementById('gallery-scroll');

galleryScroll.addEventListener('touchstart', e => {
  if (galleryScroll.scrollTop === 0) {
    pullStart = e.touches[0].clientY;
    pullActive = true;
    pullProgress = 0;
  }
}, { passive: true });

galleryScroll.addEventListener('touchmove', e => {
  if (!pullActive) return;
  const diff = e.touches[0].clientY - pullStart;
  if (diff > 10) {
    if (!pullTimer) {
      updatePullHint('Hold 5 seconds to open admin…');
      let elapsed = 0;
      pullTimer = setInterval(() => {
        elapsed += 100;
        const pct = Math.min(elapsed / 5000, 1);
        document.getElementById('progress-bar').style.width = (pct * 100) + '%';
        if (elapsed >= 5000) {
          clearInterval(pullTimer); pullTimer = null;
          document.getElementById('progress-bar').style.width = '0%';
          updatePullHint('↓ Pull down 5 seconds for admin panel');
          triggerAdminPanel();
        }
      }, 100);
    }
  }
}, { passive: true });

function endPull() {
  if (pullTimer) { clearInterval(pullTimer); pullTimer = null; }
  pullActive = false;
  document.getElementById('progress-bar').style.width = '0%';
  setTimeout(() => updatePullHint('↓ Pull down 5 seconds for admin panel'), 200);
}
galleryScroll.addEventListener('touchend', endPull, { passive: true });
galleryScroll.addEventListener('touchcancel', endPull, { passive: true });

function updatePullHint(msg) {
  document.querySelector('.pull-hint span').textContent = msg;
}
function triggerAdminPanel() {
  document.getElementById('admin-modal').classList.add('open');
  setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
}

/* ============================================================
   ADMIN AUTH
   ============================================================ */
async function checkAdminPw() {
  const input = document.getElementById('admin-pw-input').value;
  const btn = document.querySelector('#admin-modal .btn-primary');
  btn.textContent = 'Checking…'; btn.disabled = true;
  if (!ADMIN_PASSWORD) ADMIN_PASSWORD = await loadAdminPassword();
  btn.textContent = 'Unlock'; btn.disabled = false;
  if (input === ADMIN_PASSWORD) {
    closeAdminModal();
    showScreen('admin');
  } else {
    document.getElementById('admin-pw-input').style.borderColor = 'var(--danger)';
    setTimeout(() => document.getElementById('admin-pw-input').style.borderColor = '', 800);
    toast('Wrong password');
  }
}
function closeAdminModal() {
  document.getElementById('admin-modal').classList.remove('open');
  document.getElementById('admin-pw-input').value = '';
}
async function updatePassword() {
  const v = document.getElementById('new-pw-input').value.trim();
  if (!v) { toast('Enter a password'); return; }
  const btn = document.querySelector('.btn-save[onclick="updatePassword()"]');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }
  const ok = await saveAdminPasswordToDB(v);
  if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
  if (ok) {
    ADMIN_PASSWORD = v;
    document.getElementById('new-pw-input').value = '';
    toast('Password updated in Supabase ✓');
  } else {
    toast('Failed — check Supabase settings table exists');
  }
}
async function savePhotoLimit() {
  const v = parseInt(document.getElementById('limit-input').value);
  if (isNaN(v) || v < 0) { toast('Enter a valid number (0 = unlimited)'); return; }
  const ok = await savePhotoLimitToDB(v);
  if (ok) {
    PHOTO_LIMIT = v;
    toast(v === 0 ? 'Limit removed — unlimited uploads ✓' : `Limit set to ${v} photos per device ✓`);
  } else {
    toast('Failed to save limit');
  }
}

/* ============================================================
   ADMIN GRID
   ============================================================ */
async function loadAdminGrid() {
  const grid = document.getElementById('admin-grid');
  const devList = document.getElementById('devices-list');
  const limitInput = document.getElementById('limit-input');

  if (!isConfigured()) {
    grid.innerHTML = '<p style="color:var(--text-muted);font-size:13px">Supabase not configured in the HTML file.</p>';
    devList.innerHTML = '';
    return;
  }

  // Load current limit into input
  const currentLimit = await loadPhotoLimit();
  PHOTO_LIMIT = currentLimit;
  limitInput.value = currentLimit;

  // Load devices
  devList.innerHTML = '<div style="padding:10px 0;text-align:center"><div class="spinner"></div></div>';
  const devices = await loadDevices();
  if (devices.length === 0) {
    devList.innerHTML = '<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">No devices yet.</p>';
  } else {
    devList.innerHTML = devices.map(d => `
      <div class="settings-card" style="margin-bottom:10px" id="dev-card-${d.id}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px;font-weight:600">${d.name || 'Unknown'}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Last seen ${new Date(d.last_seen).toLocaleString()}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700;color:var(--accent)">${d.photo_count}</div>
            <div style="font-size:11px;color:var(--text-muted)">${currentLimit > 0 ? 'of ' + currentLimit : 'photos'}</div>
          </div>
        </div>
        ${currentLimit > 0 ? `
        <div style="margin-top:10px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">
          <div style="height:100%;background:${d.photo_count >= currentLimit ? 'var(--danger)' : 'var(--accent)'};width:${Math.min(100,(d.photo_count/currentLimit)*100)}%;border-radius:2px;transition:width 0.3s"></div>
        </div>` : ''}
        <div style="display:flex;gap:8px;margin-top:10px">
          <button onclick="resetDeviceCount('${d.device_id}','${d.id}')" style="flex:1;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:7px;font-size:12px;cursor:pointer">Reset count</button>
          <button onclick="deleteDevice('${d.id}')" style="background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer">Delete</button>
        </div>
      </div>`).join('');
  }

  // Load photos grid
  grid.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
  const allPhotos = await loadPhotos();
  if (allPhotos.length === 0) { grid.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No photos yet.</p>'; return; }
  grid.innerHTML = '';
  allPhotos.forEach(p => {
    const el = document.createElement('div');
    el.className = 'admin-photo-item';
    el.id = 'admin-item-' + p.id;
    el.innerHTML = `
      <img class="admin-photo-img" src="${p.url}" alt="">
      <div class="admin-photo-body">
        <div class="admin-meta">${p.uploader || 'Anonymous'} · ${new Date(p.created_at).toLocaleString()}</div>
        <input class="admin-caption-input" type="text" value="${(p.caption||'').replace(/"/g,'&quot;')}" placeholder="Caption..." id="cap-${p.id}">
        <div class="admin-actions">
          <button class="btn-save" onclick="saveCaption('${p.id}')">Save</button>
          <button class="btn-delete" onclick="confirmDelete('${p.id}','${p.url}')">Delete</button>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}
async function resetDeviceCount(deviceId, rowId) {
  if (!confirm('Reset this device\'s photo count to 0?')) return;
  await sbFetch(`/rest/v1/devices?id=eq.${rowId}`, {
    method: 'PATCH',
    body: JSON.stringify({ photo_count: 0 })
  });
  if (deviceId === DEVICE_ID) devicePhotoCount = 0;
  toast('Count reset ✓');
  loadAdminGrid();
}
async function deleteDevice(rowId) {
  if (!confirm('Delete this device? Their upload count will be lost.')) return;
  await sbFetch(`/rest/v1/devices?id=eq.${rowId}`, { method: 'DELETE' });
  document.getElementById('dev-card-' + rowId)?.remove();
  toast('Device deleted ✓');
}
async function saveCaption(id) {
  const cap = document.getElementById('cap-' + id).value;
  const ok = await updateCaption(id, cap);
  toast(ok ? 'Caption saved ✓' : 'Error saving');
}
async function confirmDelete(id, url) {
  if (!confirm('Delete this photo? This cannot be undone.')) return;
  await deletePhoto(id, url);
  document.getElementById('admin-item-' + id)?.remove();
  toast('Photo deleted');
}

/* ============================================================
   CAMERA
   ============================================================ */
let stream = null, facingMode = 'environment', canvas;
let currentZoom = 1, timerSeconds = 0, gridOn = false, timerRunning = false;
let currentRatio = 'full', ratioIndex = 0;
const RATIOS_DISPLAY = ['full','3:4','1:1','9:16'];
const ratioMap = { 'full': null, '3:4': 3/4, '1:1': 1, '9:16': 9/16 };

async function startCamera() {
  const video = document.getElementById('camera-video');
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => { updateCropBox(); drawZoomTicks(1); };
    currentZoom = 1; setActivePill('pill-1'); applyZoom(1); drawZoomTicks(1);
  } catch (e) { toast('Camera not available on this device'); }
}

function switchCamera() { facingMode = facingMode === 'environment' ? 'user' : 'environment'; startCamera(); }

/* ---- ZOOM ---- */
function setZoomPreset(val, pillId) {
  currentZoom = val;
  setActivePill(pillId);
  applyZoom(val);
  document.getElementById('zoom-label').textContent = val.toFixed(1) + '×';
  drawZoomTicks(val);
}
function setActivePill(id) {
  document.querySelectorAll('.zoom-pill').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(id); if (el) el.classList.add('active');
}
function applyZoom(val) {
  currentZoom = parseFloat(val);
  if (stream) {
    const track = stream.getVideoTracks()[0];
    if (track) {
      const caps = track.getCapabilities?.() || {};
      if (caps.zoom) {
        track.applyConstraints({ advanced: [{ zoom: Math.min(Math.max(currentZoom, caps.zoom.min||1), caps.zoom.max||5) }] }).catch(()=>{});
        return;
      }
    }
  }
  const video = document.getElementById('camera-video');
  video.style.transform = `scale(${Math.max(currentZoom, 1)})`;
  video.style.transformOrigin = 'center center';
}

/* ---- ZOOM TICK BAR (draggable) ---- */
const MIN_ZOOM = 0.5, MAX_ZOOM = 5;
// px per zoom unit on the ruler — higher = more spread out ticks
const ZOOM_PX_RATIO = 80;

function drawZoomTicks(zoom) {
  const cv = document.getElementById('zoom-tick-canvas');
  if (!cv) return;
  const W = cv.offsetWidth || 300;
  const H = cv.offsetHeight || 32;
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // Center of canvas = current zoom position
  // Each 1.0 zoom unit = ZOOM_PX_RATIO px
  const centerX = W / 2;
  // Draw ticks from minZ to maxZ
  // tick every 0.1 zoom units
  const tickStep = 0.1;
  for (let z = MIN_ZOOM; z <= MAX_ZOOM + tickStep; z = Math.round((z + tickStep) * 10) / 10) {
    const x = centerX + (z - zoom) * ZOOM_PX_RATIO;
    if (x < -2 || x > W + 2) continue;
    const isMajor = Math.round(z * 10) % 10 === 0;   // whole numbers: 1, 2, 3…
    const isMid   = Math.round(z * 10) % 5 === 0 && !isMajor; // 0.5, 1.5…
    const h       = isMajor ? 18 : isMid ? 11 : 6;
    const alpha   = isMajor ? 1 : isMid ? 0.65 : 0.35;
    const w       = isMajor ? 2 : 1;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(Math.round(x) - w/2, H - h, w, h);
    // Label major ticks
    if (isMajor && z >= MIN_ZOOM && z <= MAX_ZOOM) {
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(x - centerX) < 30 ? 0 : 0.55})`;
      ctx.font = '10px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(z % 1 === 0 ? z + '×' : z.toFixed(1) + '×', Math.round(x), H - 20);
    }
  }
}

function updateZoomFromDrag(newZoom) {
  currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
  currentZoom = Math.round(currentZoom * 10) / 10; // snap to 0.1
  document.getElementById('zoom-label').textContent = currentZoom.toFixed(1) + '×';
  // Update pill active state to nearest preset
  const presets = [{v:0.5,id:'pill-05'},{v:1,id:'pill-1'},{v:2,id:'pill-2'},{v:3,id:'pill-3'}];
  setActivePill(presets.reduce((a,b) => Math.abs(b.v-currentZoom) < Math.abs(a.v-currentZoom) ? b : a).id);
  applyZoom(currentZoom);
  drawZoomTicks(currentZoom);
}

// Ruler drag — touch
let rulerDragStartX = null, rulerDragStartZoom = null;
const ruler = document.getElementById('zoom-ruler');
ruler.addEventListener('touchstart', e => {
  rulerDragStartX = e.touches[0].clientX;
  rulerDragStartZoom = currentZoom;
  e.stopPropagation();
}, { passive: true });
ruler.addEventListener('touchmove', e => {
  if (rulerDragStartX === null) return;
  const dx = rulerDragStartX - e.touches[0].clientX; // drag left = zoom in
  const dz = dx / ZOOM_PX_RATIO;
  updateZoomFromDrag(rulerDragStartZoom + dz);
  e.stopPropagation();
}, { passive: true });
ruler.addEventListener('touchend', () => { rulerDragStartX = null; }, { passive: true });

// Ruler drag — mouse (for desktop testing)
let mouseDown = false, mouseDragStartX = null, mouseDragStartZoom = null;
ruler.addEventListener('mousedown', e => {
  mouseDown = true; mouseDragStartX = e.clientX; mouseDragStartZoom = currentZoom;
});
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = mouseDragStartX - e.clientX;
  const dz = dx / ZOOM_PX_RATIO;
  updateZoomFromDrag(mouseDragStartZoom + dz);
});
window.addEventListener('mouseup', () => { mouseDown = false; });

/* ---- CROP ---- */
function cycleRatio() {
  ratioIndex = (ratioIndex + 1) % RATIOS_DISPLAY.length;
  currentRatio = RATIOS_DISPLAY[ratioIndex];
  document.getElementById('ratio-btn').textContent = currentRatio;
  updateCropBox();
}
function updateCropBox() {
  const view  = document.getElementById('camera-view');
  const vw    = view.clientWidth;
  const vh    = view.clientHeight;
  const ar    = ratioMap[currentRatio]; // null = full

  const maskTop   = document.getElementById('crop-mask-top');
  const maskBot   = document.getElementById('crop-mask-bottom');
  const gridLines = document.getElementById('grid-lines');
  const tl = document.getElementById('crop-corner-tl');
  const tr = document.getElementById('crop-corner-tr');
  const bl = document.getElementById('crop-corner-bl');
  const br = document.getElementById('crop-corner-br');

  if (!ar) {
    // Full — no masks, no corners
    maskTop.style.height  = '0px';
    maskBot.style.height  = '0px';
    gridLines.style.top    = '0px';
    gridLines.style.height = vh + 'px';
    [tl,tr,bl,br].forEach(c => c.style.opacity = '0');
    return;
  }

  [tl,tr,bl,br].forEach(c => c.style.opacity = '1');

  // Portrait ratios (3:4, 9:16, 1:1): crop width = full, height from ratio
  // ar < 1 means portrait (width/height < 1)
  let cropW, cropH;
  if (ar <= 1) {
    // portrait or square: fill full width, crop top/bottom
    cropW = vw;
    cropH = Math.min(vw / ar, vh);
  } else {
    // landscape: fill full height, crop sides (shouldn't happen with new ratios)
    cropH = vh;
    cropW = Math.min(vh * ar, vw);
  }

  const cropY = (vh - cropH) / 2;
  const cropX = (vw - cropW) / 2;

  maskTop.style.height  = Math.max(0, cropY) + 'px';
  maskBot.style.height  = Math.max(0, cropY) + 'px';

  gridLines.style.top    = Math.max(0, cropY) + 'px';
  gridLines.style.height = cropH + 'px';

  tl.style.top    = Math.max(0, cropY) + 'px'; tl.style.left  = cropX + 'px';
  tr.style.top    = Math.max(0, cropY) + 'px'; tr.style.right = cropX + 'px';
  bl.style.bottom = Math.max(0, cropY) + 'px'; bl.style.left  = cropX + 'px';
  br.style.bottom = Math.max(0, cropY) + 'px'; br.style.right = cropX + 'px';
}

/* ---- GRID ---- */
function toggleGrid() {
  gridOn = !gridOn;
  document.getElementById('grid-lines').style.display = gridOn ? 'block' : 'none';
  document.getElementById('grid-btn').style.color = gridOn ? 'var(--accent)' : '#fff';
}

/* ---- TIMER ---- */
const timerOptions = [0,3,5,10]; let timerIndex = 0;
function cycleTimer() {
  timerIndex = (timerIndex + 1) % timerOptions.length;
  timerSeconds = timerOptions[timerIndex];
  const btn = document.getElementById('timer-btn');
  btn.textContent = timerSeconds === 0 ? '⏱' : timerSeconds + 's';
  btn.style.color = timerSeconds > 0 ? 'var(--accent)' : '#fff';
}

/* ---- SHOOT ---- */
async function takePhoto() {
  if (!stream) { toast('Camera not available'); return; }
  if (!isConfigured()) { toast('Configure Supabase first'); return; }
  if (!uploaderName) { showNameModal(); return; }
  if (timerRunning) return;
  if (timerSeconds > 0) {
    timerRunning = true;
    const display = document.getElementById('timer-display');
    const count = document.getElementById('timer-count');
    display.style.display = 'flex'; let t = timerSeconds; count.textContent = t;
    const iv = setInterval(() => {
      t--; if (t <= 0) { clearInterval(iv); display.style.display = 'none'; timerRunning = false; captureFrame(); }
      else count.textContent = t;
    }, 1000);
  } else { captureFrame(); }
}

function captureFrame() {
  const video = document.getElementById('camera-video');
  if (!canvas) canvas = document.createElement('canvas');
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 720;
  const ar = ratioMap[currentRatio]; // null = full

  let cw, ch, ox, oy;
  if (!ar) {
    // Full — use entire frame
    cw = vw; ch = vh; ox = 0; oy = 0;
  } else if (ar <= 1) {
    // Portrait/square: full width, crop top/bottom
    cw = vw; ch = Math.min(Math.round(vw / ar), vh);
    ox = 0; oy = Math.round((vh - ch) / 2);
  } else {
    // Landscape: full height, crop sides
    ch = vh; cw = Math.min(Math.round(vh * ar), vw);
    ox = Math.round((vw - cw) / 2); oy = 0;
  }

  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d');
  if (facingMode === 'user') { ctx.translate(cw, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, ox, oy, cw, ch, 0, 0, cw, ch);

  // Flash
  const fDiv=document.createElement('div');
  fDiv.style.cssText='position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;transition:opacity 0.08s';
  document.getElementById('camera-view').appendChild(fDiv);
  requestAnimationFrame(()=>{ fDiv.style.opacity='1'; setTimeout(()=>{ fDiv.style.opacity='0'; setTimeout(()=>fDiv.remove(),200); },80); });

  // Show preview modal
  canvas.toBlob(blob => {
    pendingBlob = blob;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-caption').value = '';
    document.getElementById('preview-modal').classList.add('open');
  }, 'image/jpeg', 0.92);
}

let pendingBlob = null;
async function submitPreview() {
  if (!pendingBlob) { toast('No photo to upload'); return; }
  const btn = document.getElementById('preview-upload-btn');
  btn.textContent = 'Uploading…'; btn.disabled = true;
  const caption = document.getElementById('preview-caption').value.trim();
  try {
    await doUpload(pendingBlob, 'photo.jpg', caption);
    document.getElementById('preview-modal').classList.remove('open');
    pendingBlob = null;
  } catch(e) {
    if (e.message !== 'limit_reached') toast('Upload failed — check Supabase config');
    console.error(e);
  }
  btn.textContent = 'Upload'; btn.disabled = false;
}

function retakePhoto() {
  pendingBlob = null;
  document.getElementById('preview-modal').classList.remove('open');
}

/* ---- PINCH ZOOM ---- */
let pinchStartDist=0, pinchStartZoom=1;
document.getElementById('camera-view').addEventListener('touchstart',e=>{
  if(e.touches.length===2){ pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); pinchStartZoom=currentZoom; }
},{passive:true});
document.getElementById('camera-view').addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const nz=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,pinchStartZoom*(dist/pinchStartDist)));
    updateZoomFromDrag(nz);
  }
},{passive:true});
window.addEventListener('resize', updateCropBox);

async function doUpload(blob, filename, caption) {
  if (PHOTO_LIMIT === null) PHOTO_LIMIT = await loadPhotoLimit();
  if (PHOTO_LIMIT > 0 && devicePhotoCount >= PHOTO_LIMIT) {
    toast(`Limit reached — max ${PHOTO_LIMIT} photo${PHOTO_LIMIT !== 1 ? 's' : ''} per device`);
    throw new Error('limit_reached');
  }
  setProgress(10);
  try {
    setProgress(40);
    await uploadPhoto(blob, filename, caption);
    await incrementDeviceCount();
    setProgress(100);
    toast(`Photo uploaded! ✓ (${devicePhotoCount}/${PHOTO_LIMIT > 0 ? PHOTO_LIMIT : '∞'})`);
    setTimeout(() => setProgress(0), 600);
  } catch (e) {
    setProgress(0);
    toast('Upload failed — check Supabase config');
    console.error(e);
  }
}
function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

/* ============================================================
   NAME MODAL
   ============================================================ */
function showNameModal() { document.getElementById('name-modal').classList.add('open'); }
async function saveName() {
  const v = document.getElementById('name-input').value.trim();
  if (!v) { toast('Enter your name'); return; }
  uploaderName = v;
  localStorage.setItem('uploaderName', v);
  document.getElementById('name-modal').classList.remove('open');
  await registerOrUpdateDevice();
}
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ============================================================
   INIT
   ============================================================ */
(async () => {
  // Nav
  document.getElementById('nav-gallery').addEventListener('click', () => showScreen('gallery'));
  document.getElementById('nav-camera').addEventListener('click',  () => showScreen('camera'));
  document.getElementById('nav-gallery2').addEventListener('click', () => showScreen('gallery'));

  // Gallery header
  document.getElementById('refresh-btn').addEventListener('click', loadGallery);
  document.getElementById('admin-open-btn').addEventListener('click', triggerAdminPanel);

  // Camera controls
  document.getElementById('grid-btn').addEventListener('click', toggleGrid);
  document.getElementById('timer-btn').addEventListener('click', cycleTimer);
  document.getElementById('ratio-btn').addEventListener('click', cycleRatio);
  document.getElementById('shutter-btn').addEventListener('click', takePhoto);
  document.getElementById('flip-btn').addEventListener('click', switchCamera);

  // Zoom pills
  document.getElementById('pill-05').addEventListener('click', () => setZoomPreset(0.5, 'pill-05'));
  document.getElementById('pill-1').addEventListener('click',  () => setZoomPreset(1,   'pill-1'));
  document.getElementById('pill-2').addEventListener('click',  () => setZoomPreset(2,   'pill-2'));
  document.getElementById('pill-3').addEventListener('click',  () => setZoomPreset(3,   'pill-3'));

  document.getElementById('preview-upload-btn').addEventListener('click', submitPreview);
  document.getElementById('preview-retake-btn').addEventListener('click', retakePhoto);

  // Lightbox
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

  // Admin modal
  document.getElementById('admin-pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkAdminPw(); });
  document.getElementById('admin-close-btn')?.addEventListener('click', () => showScreen('gallery'));

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') triggerAdminPanel();
  });

  // Start
  loadGallery();
  startCamera();
  if (!uploaderName) {
    setTimeout(showNameModal, 500);
  } else {
    await registerOrUpdateDevice();
    PHOTO_LIMIT = await loadPhotoLimit();
  }

  // Expose functions used in dynamically generated HTML
  window.deleteDevice      = deleteDevice;
  window.resetDeviceCount  = resetDeviceCount;
  window.saveCaption       = saveCaption;
  window.confirmDelete     = confirmDelete;
})();

</script>
